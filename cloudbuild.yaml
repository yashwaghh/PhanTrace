# Cloud Build – builds and deploys both Cloud Run services.
#
# Required substitutions (set in the Cloud Build trigger or passed via CLI):
#   _REGION          – GCP region, e.g. us-central1
#   _BACKEND_SERVICE – Cloud Run service name for the backend
#   _FRONTEND_SERVICE – Cloud Run service name for the frontend
#   _NEXT_PUBLIC_API_URL – Public URL of the deployed backend service
#
# Example trigger command:
#   gcloud builds submit \
#     --substitutions _REGION=us-central1,\
#                     _BACKEND_SERVICE=phantrace-backend,\
#                     _FRONTEND_SERVICE=phantrace-frontend,\
#                     _NEXT_PUBLIC_API_URL=https://phantrace-backend-<hash>-uc.a.run.app

substitutions:
  _REGION: us-central1
  _BACKEND_SERVICE: phantrace-backend
  _FRONTEND_SERVICE: phantrace-frontend
  _NEXT_PUBLIC_API_URL: ""

steps:
  # ── 0. Validate required substitutions ─────────────────────────────────────
  - name: "bash"
    id: validate-substitutions
    script: |
      #!/usr/bin/env bash
      set -e
      if [ -z "${_NEXT_PUBLIC_API_URL}" ]; then
        echo "ERROR: _NEXT_PUBLIC_API_URL substitution is required but was not set."
        echo "Pass it via --substitutions _NEXT_PUBLIC_API_URL=https://<backend-url>"
        exit 1
      fi

  # ── 1. Build backend image ──────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: build-backend
    waitFor:
      - validate-substitutions
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:latest
      - ./backend

  # ── 2. Build frontend image ─────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: build-frontend
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:latest
      - --build-arg
      - NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}
      - ./frontend

  # ── 3. Push backend image ───────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: push-backend
    waitFor:
      - build-backend
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}

  # ── 4. Push frontend image ──────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: push-frontend
    waitFor:
      - build-frontend
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}

  # ── 5. Deploy backend to Cloud Run ──────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-backend
    waitFor:
      - push-backend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_BACKEND_SERVICE}
      - --image=gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated   # PhanTrace API is public-facing; restrict with IAM if needed
      - --set-env-vars=DATABASE_URL=$$DATABASE_URL,SERPAPI_KEY=$$SERPAPI_KEY
      - DATABASE_URL
      - SERPAPI_KEY

  # ── 6. Deploy frontend to Cloud Run ─────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-frontend
    waitFor:
      - push-frontend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_FRONTEND_SERVICE}
      - --image=gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated

images:
  - gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:latest
  - gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:latest

# Expose secrets stored in Secret Manager to the build
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DATABASE_URL/versions/latest
      env: DATABASE_URL
    - versionName: projects/$PROJECT_ID/secrets/SERPAPI_KEY/versions/latest
      env: SERPAPI_KEY

options:
  logging: CLOUD_LOGGING_ONLY
